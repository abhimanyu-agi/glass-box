version: "3.8"

services:
  finance-postgres:
    image: pgvector/pgvector:pg16
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - finance_pgdata:/var/lib/postgresql/data
    networks:
      - poc-network

volumes:
  finance_pgdata:

networks:
  poc-network:
    driver: bridge